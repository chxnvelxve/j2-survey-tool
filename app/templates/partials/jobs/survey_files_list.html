{% if job.survey_files %}
<ul>
  {% for f in job.survey_files %}
  <li>
    {{ f.original_filename }}
    <span class="muted tabular-nums">({{ f.uploaded_at.strftime("%Y-%m-%d %H:%M") }})</span>
    {% if not job_locked %}
    <button type="button"
            class="btn-remove"
            hx-delete="/jobs/{{ job.id }}/survey-files/{{ f.id }}"
            hx-target="#survey-files-list"
            hx-swap="innerHTML"
            hx-confirm="Remove {{ f.original_filename }}?">Remove</button>
    {% endif %}
  </li>
  {% endfor %}
</ul>
{% else %}
<p class="muted">No survey files uploaded yet.</p>
{% endif %}
