<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Survey Tool{% endblock %}</title>
  <style>
    :root { --brand-primary: {{ brand_primary_color }}; }
  </style>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="/static/js/htmx.min.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <h1>{{ brand_company_name }}</h1>
      {% if app_env is defined %}
      <span class="badge badge--env">{{ app_env }}</span>
      {% endif %}
    </div>
    <nav><a href="/jobs">Jobs</a></nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
