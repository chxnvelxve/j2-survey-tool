<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Survey Tool{% endblock %}</title>
  <style>
    :root {
      --brand-primary: {{ brand_primary_color }};
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.5;
      margin: 0;
      padding: 1.5rem;
      padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
      color: #1a1a1a;
      background: #f8f9fa;
    }
    header {
      border-bottom: 3px solid var(--brand-primary);
      padding-bottom: 0.75rem;
      margin-bottom: 1.5rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.25rem;
      color: var(--brand-primary);
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      background: #e9ecef;
      color: #495057;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    main {
      max-width: 40rem;
    }
    nav {
      margin-top: 0.5rem;
      font-size: 0.875rem;
    }
    nav a {
      color: var(--brand-primary);
      text-decoration: none;
    }
    nav a:hover { text-decoration: underline; }
    .table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
    }
    .table th, .table td {
      padding: 0.5rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid #dee2e6;
    }
    .table th { background: #e9ecef; font-size: 0.875rem; }
    form label { display: block; margin-bottom: 0.75rem; }
    form input[type="text"],
    form input[type="password"],
    form input[type="file"],
    form select {
      display: block;
      margin-top: 0.25rem;
      padding: 0.35rem 0.5rem;
      width: 100%;
      max-width: 24rem;
    }
    form button {
      margin-top: 0.5rem;
      padding: 0.4rem 0.9rem;
      background: var(--brand-primary);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    form button:hover { opacity: 0.9; }
    .btn-remove {
      margin-left: 0.5rem;
      padding: 0.15rem 0.45rem;
      font-size: 0.75rem;
      background: transparent;
      color: #842029;
      border: 1px solid #f1aeb5;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-remove:hover { background: #f8d7da; }
    .upload-section {
      background: #fff;
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .upload-section h3 {
      margin-top: 0;
      font-size: 1rem;
    }
    .muted { color: #6c757d; font-size: 0.875rem; }
    .error { color: #842029; font-size: 0.875rem; }
    .parsed-file { margin-bottom: 1rem; }
    .parsed-file h4 { margin: 0 0 0.5rem; font-size: 0.875rem; font-weight: 600; }
    .flag-resolve-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .flag-resolve-toolbar label { margin-bottom: 0; flex: 1; min-width: 12rem; }
    .flag-resolve-toolbar button { margin-top: 0; flex-shrink: 0; }
    .flag-col-select { width: 2.5rem; text-align: center; }
    .flag-row--unresolved { background: #fff8f0; }
    .flag-row--resolved { background: #e8f5e9; color: #495057; }
    .badge--resolved {
      background: #c8e6c9;
      color: #1b5e20;
      text-transform: none;
      letter-spacing: normal;
      font-weight: 500;
    }
    .checklist {
      list-style: none;
      padding: 0;
      margin: 0 0 1rem;
      font-size: 0.875rem;
    }
    .checklist li {
      padding: 0.25rem 0 0.25rem 1.25rem;
      position: relative;
    }
    .checklist li::before {
      content: "○";
      position: absolute;
      left: 0;
      color: #6c757d;
    }
    .checklist--ok::before { content: "✓"; color: #198754; }
    .checklist--pending::before { content: "○"; color: #6c757d; }
    /* Phase 11 — field capture (phone-width) */
    .capture-page main,
    .capture-page {
      max-width: 28rem;
    }
    .capture-label {
      display: block;
      margin-bottom: 0.75rem;
      font-weight: 500;
    }
    .touch-target {
      min-height: 2.75rem;
      font-size: 1rem;
      width: 100%;
      max-width: none;
      padding: 0.6rem 0.75rem;
    }
    form button.touch-target {
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.75rem 1rem;
      font-size: 1rem;
    }
    .capture-slots {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin: 1rem 0;
    }
    .capture-slot {
      background: #f1f3f5;
      border-radius: 6px;
      padding: 0.75rem;
    }
    .capture-slot h4 {
      margin: 0 0 0.5rem;
      font-size: 0.95rem;
    }
    .hint {
      color: #856404;
      background: #fff3cd;
      border: 1px solid #ffecb5;
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      margin: 0.5rem 0;
    }
    .capture-photo-list {
      list-style: none;
      padding: 0;
      margin: 0.75rem 0 0;
    }
    .capture-photo-list li {
      padding: 0.5rem 0;
      border-bottom: 1px solid #dee2e6;
      font-size: 0.9rem;
    }
    .capture-settings-readonly dt {
      font-size: 0.75rem;
      color: #6c757d;
      margin-top: 0.5rem;
    }
    .capture-settings-readonly dd {
      margin: 0.15rem 0 0;
    }
    /* Mobile-readable stacked cards (jobs / APs / flags) */
    .card-list {
      list-style: none;
      padding: 0;
      margin: 0 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .item-card {
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 0.85rem 1rem;
    }
    .item-card__header {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .item-card__title {
      font-weight: 600;
      font-size: 1rem;
      word-break: break-word;
    }
    a.item-card__title {
      color: var(--brand-primary);
      text-decoration: none;
      display: block;
      padding: 0.15rem 0;
      min-height: 2.5rem;
    }
    a.item-card__title:hover { text-decoration: underline; }
    .item-card__meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 0.75rem;
      margin-top: 0.35rem;
    }
    .item-card__fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 0.75rem;
      margin: 0;
    }
    .item-card__fields dt {
      margin: 0;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #6c757d;
    }
    .item-card__fields dd {
      margin: 0.1rem 0 0;
      font-size: 0.9rem;
      word-break: break-word;
    }
    .item-card__detail {
      margin: 0.35rem 0 0;
      font-size: 0.9rem;
      line-height: 1.45;
    }
    .flag-detail {
      margin-top: 0.35rem;
      font-size: 0.85rem;
      line-height: 1.4;
      color: #495057;
    }
    .flag-detail summary {
      cursor: pointer;
      list-style-position: outside;
      padding: 0.35rem 0;
      min-height: 2.5rem;
      color: #495057;
    }
    .flag-detail summary::-webkit-details-marker {
      color: #6c757d;
    }
    .flag-detail__full {
      margin: 0.35rem 0 0;
      padding: 0.5rem 0.65rem;
      background: rgba(0, 0, 0, 0.04);
      border-radius: 4px;
      font-size: 0.85rem;
      line-height: 1.45;
    }
    .flag-card-select {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin: 0;
      flex: 1;
      min-width: 0;
    }
    .flag-card-select input[type="checkbox"] {
      width: 1.25rem;
      height: 1.25rem;
      margin-top: 0.15rem;
      flex-shrink: 0;
    }
    .flag-select-all-row {
      margin-bottom: 0.75rem;
    }
    .flag-select-all-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0;
      font-size: 0.9rem;
    }
    .flag-select-all-label input[type="checkbox"] {
      width: 1.25rem;
      height: 1.25rem;
    }
    .action-link {
      display: inline-block;
      padding: 0.5rem 0;
      min-height: 2.5rem;
      font-weight: 500;
    }
    @media (max-width: 40rem) {
      body {
        padding: 1rem;
        padding-bottom: calc(5rem + env(safe-area-inset-bottom, 0px));
      }
      main { max-width: none; }
      nav a {
        display: inline-block;
        padding: 0.4rem 0;
        min-height: 2.5rem;
      }
      .page-nav a {
        display: inline-block;
        padding: 0.45rem 0.15rem;
        min-height: 2.5rem;
      }
      .item-card__fields {
        grid-template-columns: 1fr;
      }
      .flag-resolve-toolbar {
        flex-direction: column;
        align-items: stretch;
      }
      .flag-resolve-toolbar label { min-width: 0; }
      .flag-resolve-toolbar button {
        width: 100%;
        min-height: 2.75rem;
      }
      .flag-resolve-toolbar input[type="text"] {
        max-width: none;
        min-height: 2.75rem;
      }
    }
  </style>
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <h1>{{ brand_company_name }}</h1>
    <nav><a href="/jobs">Jobs</a></nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
