<span id="job-status" hx-swap-oob="innerHTML" class="badge">{{ job_status_label(job.status) }}</span>
{% if job.attachments %}
<ul>
  {% for a in job.attachments %}
  <li>{{ a.original_filename }} <span class="muted">({{ a.uploaded_at.strftime("%Y-%m-%d %H:%M") }})</span></li>
  {% endfor %}
</ul>
{% else %}
<p class="muted">No attachments uploaded yet.</p>
{% endif %}
