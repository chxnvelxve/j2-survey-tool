<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Survey Tool{% endblock %}</title>
  <style>
    :root {
      --brand-primary: {{ brand_primary_color }};
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.5;
      margin: 0;
      padding: 1.5rem;
      color: #1a1a1a;
      background: #f8f9fa;
    }
    header {
      border-bottom: 3px solid var(--brand-primary);
      padding-bottom: 0.75rem;
      margin-bottom: 1.5rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.25rem;
      color: var(--brand-primary);
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      background: #e9ecef;
      color: #495057;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    main {
      max-width: 40rem;
    }
    nav {
      margin-top: 0.5rem;
      font-size: 0.875rem;
    }
    nav a {
      color: var(--brand-primary);
      text-decoration: none;
    }
    nav a:hover { text-decoration: underline; }
    .table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
    }
    .table th, .table td {
      padding: 0.5rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid #dee2e6;
    }
    .table th { background: #e9ecef; font-size: 0.875rem; }
    form label { display: block; margin-bottom: 0.75rem; }
    form input[type="text"],
    form input[type="file"],
    form select {
      display: block;
      margin-top: 0.25rem;
      padding: 0.35rem 0.5rem;
      width: 100%;
      max-width: 24rem;
    }
    form button {
      margin-top: 0.5rem;
      padding: 0.4rem 0.9rem;
      background: var(--brand-primary);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    form button:hover { opacity: 0.9; }
    .btn-remove {
      margin-left: 0.5rem;
      padding: 0.15rem 0.45rem;
      font-size: 0.75rem;
      background: transparent;
      color: #842029;
      border: 1px solid #f1aeb5;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-remove:hover { background: #f8d7da; }
    .upload-section {
      background: #fff;
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .upload-section h3 {
      margin-top: 0;
      font-size: 1rem;
    }
    .muted { color: #6c757d; font-size: 0.875rem; }
    .error { color: #842029; font-size: 0.875rem; }
    .parsed-file { margin-bottom: 1rem; }
    .parsed-file h4 { margin: 0 0 0.5rem; font-size: 0.875rem; font-weight: 600; }
  </style>
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <h1>{{ brand_company_name }}</h1>
    <nav><a href="/jobs">Jobs</a></nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
